      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/db_eventos
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      config-server:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - eventflow-network

  msvc-recintos:
